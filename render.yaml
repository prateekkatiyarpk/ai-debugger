services:
  - type: web
    name: ai-debugger
    runtime: python
    buildCommand: ./build.sh
    startCommand: python -m gunicorn ai_debugger.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: AI_DEBUGGER_MODEL
        value: "gpt-5.4-mini"
      - key: AI_DEBUGGER_ENABLE_COMMAND_EXECUTION
        value: "0"
      - key: OPENAI_API_KEY
        sync: false
